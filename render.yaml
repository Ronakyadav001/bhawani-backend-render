services:
  - type: web
    name: bhawani-fitness-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: SUPPORT_HOURS
        value: 10:00-19:00 IST
      - key: SUPPORT_CHAT_URL
        sync: false
      - key: SALES_PANEL_URL
        sync: false
      - key: TRAINER_PANEL_URL
        sync: false
      - key: DIETICIAN_PANEL_URL
        sync: false
      - key: SUPPORT_PANEL_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: ZOOM_ACCOUNT_ID
        sync: false
      - key: ZOOM_CLIENT_ID
        sync: false
      - key: ZOOM_CLIENT_SECRET
        sync: false
